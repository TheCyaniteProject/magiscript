<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" /><meta http-equiv="Content-Security-Policy" content="
  default-src 'self'; 
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
  font-src 'self' https://gstatic.com;
">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MagiScript</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <button class="tray-toggle-float" id="trayToggle" type="button" aria-label="Toggle tray"></button>
      <button class="play-button" id="playProgram" type="button" aria-label="Execute program">
        Cast  ▶
      </button>
      <button class="step-button" id="stepProgram" type="button" aria-label="Step through program">
        Step
      </button>
      <button class="save-button" id="saveProgram" type="button" aria-label="Save script">
        Save
      </button>
      <button class="load-button" id="loadProgram" type="button" aria-label="Load script">
        Load
      </button>
      <button class="recenter-button" id="recenterCanvas" type="button" aria-label="Go to top node">
        Top
      </button>
      <button class="parent-button" id="focusParentNode" type="button" aria-label="Focus parent node">
        Up
      </button>
      <button class="line-tool-button" id="lineToolToggle" type="button" aria-pressed="false">
        Line Tool
      </button>

      <aside class="tray" data-collapsed="false">
        <div class="tray__header">
          <div>
            <h1>Glyphs</h1>
          </div>
        </div>

        <div class="object-grid">
          <button
            class="object-card"
            id="nodeObject"
            type="button"
            draggable="true"
            data-object-type="node"
            data-name="Node"
            data-description="A hollow circle mark used to place a node on the canvas."
            aria-label="Node glyph"
          >
            <span class="object-card__preview" aria-hidden="true">
              <span class="tray-label">NODE</span>
            </span>
          </button>
          <button
            class="object-card"
            type="button"
            draggable="true"
            data-object-type="variable"
            data-name="Variable"
            data-description="Stores a string value and replaces the current runtime value when executed."
            aria-label="Variable glyph"
          >
            <span class="object-card__preview" aria-hidden="true">
              <span class="tray-label">VAR</span>
            </span>
          </button>
          <button
            class="object-card"
            type="button"
            draggable="true"
            data-object-type="reference"
            data-name="Reference"
            data-description="References a Variable glyph and loads that variable's current value."
            aria-label="Reference glyph"
          >
            <span class="object-card__preview" aria-hidden="true">
              <span class="tray-label">REF</span>
            </span>
          </button>
          <button
            class="object-card"
            type="button"
            draggable="true"
            data-object-type="value"
            data-name="Value (Deprecated)"
            data-description="Deprecated: Value glyphs are redundant and kept for backward compatibility."
            aria-label="Value glyph"
          >
            <span class="object-card__preview" aria-hidden="true">
              <span class="tray-label">IN</span>
            </span>
          </button>
          <button
            class="object-card"
            type="button"
            draggable="true"
            data-object-type="label"
            data-name="Label"
            data-description="Marks a jump target. It passes the runtime value through unchanged."
            aria-label="Label glyph"
          >
            <span class="object-card__preview" aria-hidden="true">
              <span class="tray-label">LBL</span>
            </span>
          </button>
          <button
            class="object-card"
            type="button"
            draggable="true"
            data-object-type="goto"
            data-name="Goto"
            data-description="Jumps execution to a selected Label glyph anywhere in the program."
            aria-label="Goto glyph"
          >
            <span class="object-card__preview" aria-hidden="true">
              <span class="tray-label">GOTO</span>
            </span>
          </button>
          <button
            class="object-card"
            type="button"
            draggable="true"
            data-object-type="add"
            data-name="Add"
            data-description="Adds its operand to the current runtime value."
            aria-label="Add glyph"
          >
            <span class="object-card__preview" aria-hidden="true">
              <span class="tray-label">+</span>
            </span>
          </button>
          <button
            class="object-card"
            type="button"
            draggable="true"
            data-object-type="subtract"
            data-name="Subtract"
            data-description="Subtracts its operand from the current runtime value."
            aria-label="Subtract glyph"
          >
            <span class="object-card__preview" aria-hidden="true">
              <span class="tray-label">-</span>
            </span>
          </button>
          <button
            class="object-card"
            type="button"
            draggable="true"
            data-object-type="setvalue"
            data-name="Set Value"
            data-description="Sets the previous Variable/Reference to the Param value."
            aria-label="Set Value glyph"
          >
            <span class="object-card__preview" aria-hidden="true">
              <span class="tray-label">=</span>
            </span>
          </button>
          <button
            class="object-card"
            type="button"
            draggable="true"
            data-object-type="output"
            data-name="Output"
            data-description="Prints the current runtime value to the console."
            aria-label="Output glyph"
          >
            <span class="object-card__preview" aria-hidden="true">
              <span class="tray-label">PRINT</span>
            </span>
          </button>
          <button
            class="object-card"
            type="button"
            draggable="true"
            data-object-type="ifelse"
            data-name="If / Else"
            data-description="Branch glyph placeholder with one input and two outputs. Execution logic not implemented yet."
            aria-label="If else glyph"
          >
            <span class="object-card__preview" aria-hidden="true">
              <span class="tray-label">IF</span>
            </span>
          </button>
          <button
            class="object-card"
            type="button"
            draggable="true"
            data-object-type="boolean"
            data-name="Boolean"
            data-description="Compares input and param, or acts as a true/false param literal when placed on the outer ring."
            aria-label="Boolean glyph"
          >
            <span class="object-card__preview" aria-hidden="true">
              <span class="tray-label">EQ</span>
            </span>
          </button>
        </div>
      </aside>

      <main class="stage-wrap">
        <div class="canvas-frame" id="dropZone">
          <canvas id="sceneCanvas" aria-label="Canvas for spawned objects"></canvas>
        </div>
      </main>

      <section class="message-log" id="messageLog" data-collapsed="true" aria-label="Message log">
        <header class="message-log__header">
          <span class="message-log__title">Message Log</span>
          <button
            class="message-log__toggle"
            id="messageLogToggle"
            type="button"
            aria-expanded="false"
            aria-controls="messageLogBody"
          >
            Expand
          </button>
        </header>
        <div class="message-log__body" id="messageLogBody" role="log" aria-live="polite"></div>
      </section>
    </div>

    <div class="hover-tooltip" id="hoverTooltip" aria-hidden="true"></div>

    <div class="modal-backdrop" id="variableModalBackdrop" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="variableModalTitle">
        <h2 id="variableModalTitle">Edit Variable</h2>
        <label class="modal-field">
          <span>Name</span>
          <input id="variableModalNameInput" class="modal-input" type="text" autocomplete="off" />
        </label>
        <label class="modal-field">
          <span>Value</span>
        <input id="variableModalInput" class="modal-input" type="text" autocomplete="off" />
        </label>
        <div class="modal-actions">
          <button id="variableModalCancel" type="button">Cancel</button>
          <button id="variableModalAccept" type="button">Accept</button>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="referenceModalBackdrop" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="referenceModalTitle">
        <h2 id="referenceModalTitle">Edit Reference</h2>
        <label class="modal-field">
          <span>Target</span>
          <select id="referenceModalSelect" class="modal-input"></select>
        </label>
        <div class="modal-actions">
          <button id="referenceModalCancel" type="button">Cancel</button>
          <button id="referenceModalAccept" type="button">Accept</button>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="labelModalBackdrop" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="labelModalTitle">
        <h2 id="labelModalTitle">Edit Label</h2>
        <label class="modal-field">
          <span>Name</span>
          <input id="labelModalNameInput" class="modal-input" type="text" autocomplete="off" />
        </label>
        <div class="modal-actions">
          <button id="labelModalCancel" type="button">Cancel</button>
          <button id="labelModalAccept" type="button">Accept</button>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="booleanModalBackdrop" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="booleanModalTitle">
        <h2 id="booleanModalTitle">Edit Boolean</h2>
        <label class="modal-field" id="booleanModalOperatorField">
          <span>Operator</span>
          <select id="booleanModalOperatorSelect" class="modal-input">
            <option value="less">LT — Less</option>
            <option value="greater">GT — Greater</option>
            <option value="equal">EQ — Equal</option>
            <option value="not-equal">NE — Not Equal</option>
          </select>
        </label>
        <label class="modal-field modal-field--checkbox" id="booleanModalCheckboxField">
          <span>Value</span>
          <label class="modal-checkbox">
            <input id="booleanModalCheckbox" type="checkbox" />
            <span>True</span>
          </label>
        </label>
        <div class="modal-actions">
          <button id="booleanModalCancel" type="button">Cancel</button>
          <button id="booleanModalAccept" type="button">Accept</button>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="ifElseModalBackdrop" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="ifElseModalTitle">
        <h2 id="ifElseModalTitle">Edit If / Else</h2>
        <label class="modal-field">
          <span>Boolean mode</span>
          <select id="ifElseModalModeSelect" class="modal-input">
            <option value="and">AND</option>
            <option value="or">OR</option>
          </select>
        </label>
        <div class="modal-actions">
          <button id="ifElseModalCancel" type="button">Cancel</button>
          <button id="ifElseModalAccept" type="button">Accept</button>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="deleteModalBackdrop" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
        <h2 id="deleteModalTitle">Delete Node?</h2>
        <p class="modal-copy">Delete this node and all of its child glyphs?</p>
        <div class="modal-actions">
          <button id="deleteModalCancel" type="button">Cancel</button>
          <button id="deleteModalConfirm" type="button">Delete</button>
        </div>
      </div>
    </div>

    <script src="./glyphs/Glyph.js"></script>
    <script src="./glyphs/IOConnector.js"></script>
    <script src="./glyphs/StartGlyph.js"></script>
    <script src="./glyphs/NodeGlyph.js"></script>
    <script src="./glyphs/VariableGlyph.js"></script>
    <script src="./glyphs/ValueGlyph.js"></script>
    <script src="./glyphs/ReferenceGlyph.js"></script>
    <script src="./glyphs/LabelGlyph.js"></script>
    <script src="./glyphs/GotoGlyph.js"></script>
    <script src="./glyphs/AddGlyph.js"></script>
    <script src="./glyphs/SubtractGlyph.js"></script>
    <script src="./glyphs/SetValueGlyph.js"></script>
    <script src="./glyphs/OutputGlyph.js"></script>
    <script src="./glyphs/IfElseGlyph.js"></script>
    <script src="./glyphs/BooleanGlyph.js"></script>
    <script src="./renderer/services/GlyphGeometryService.js"></script>
    <script src="./renderer/services/RuntimeMathService.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
